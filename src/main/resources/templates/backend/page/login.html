<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云禧小馆 · 后台管理登录</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", system-ui, -apple-system, sans-serif;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #4a2c2a, #774936, #b4846c, #d4a373);
            background-size: 400% 400%;
            animation: gradientFlow 16s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .float-ball-1, .float-ball-2, .float-ball-3 {
            position: absolute;
            border-radius: 50%;
            opacity: 0.18;
            filter: blur(70px);
            z-index: 1;
        }
        .float-ball-1 {
            width: 360px;
            height: 360px;
            background: #e9c46a;
            top: 8%;
            left: 6%;
            animation: floatUp 8s ease-in-out infinite;
        }
        .float-ball-2 {
            width: 420px;
            height: 420px;
            background: #f4a261;
            bottom: 12%;
            right: 7%;
            animation: floatDown 10s ease-in-out infinite;
        }
        .float-ball-3 {
            width: 220px;
            height: 220px;
            background: #e76f51;
            top: 45%;
            right: 22%;
            animation: floatLeft 7s ease-in-out infinite;
        }

        @keyframes floatUp {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-40px); }
        }
        @keyframes floatDown {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(40px); }
        }
        @keyframes floatLeft {
            0%,100% { transform: translateX(0); }
            50% { transform: translateX(-30px); }
        }

        .login-box {
            position: relative;
            z-index: 2;
            width: 460px;
            padding: 52px 42px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 0.18);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(30, 15, 10, 0.35);
        }

        .login-header {
            text-align: center;
            margin-bottom: 44px;
        }
        .login-header i {
            font-size: 36px;
            color: #f4a261;
            margin-bottom: 12px;
            display: block;
        }
        .login-header h1 {
            font-size: 30px;
            color: #ffffff;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }
        .login-header p {
            color: rgba(235, 225, 215, 0.78);
            font-size: 14px;
            letter-spacing: 1px;
        }

        .input-item {
            margin-bottom: 28px;
            position: relative;
        }
        .input-item i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.65);
            font-size: 19px;
        }
        .input-item input {
            width: 100%;
            height: 54px;
            padding-left: 52px;
            padding-right: 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 0.14);
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.35s ease;
        }
        .input-item input::placeholder {
            color: rgba(255, 255, 255, 0.42);
        }
        .input-item input:focus {
            border-color: rgba(244, 162, 97, 0.75);
            box-shadow: 0 0 16px rgba(244, 162, 97, 0.32);
            background: rgba(255,255,0.09);
        }

        .submit-btn {
            width: 100%;
            height: 56px;
            margin-top: 12px;
            border-radius: 14px;
            border: none;
            font-size: 17px;
            font-weight: 500;
            color: #fff;
            background: linear-gradient(125deg, #b4846c, #e76f51);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .submit-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,0.25), transparent);
            transition: left 0.7s ease;
        }
        .submit-btn:hover::before {
            left: 100%;
        }
        .submit-btn:hover {
            box-shadow: 0 0 22px rgba(231, 111, 81, 0.48);
            transform: translateY(-3px);
        }
        .submit-btn:active {
            transform: translateY(0);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .tips-text {
            text-align: center;
            margin-top: 32px;
            font-size: 13px;
            color: rgba(240, 228, 216, 0.55);
        }
    </style>
</head>
<body>
<div class="float-ball-1"></div>
<div class="float-ball-2"></div>
<div class="float-ball-3"></div>

<div class="login-box">
    <div class="login-header">
        <i class="fa-solid fa-bowl-food"></i>
        <h1>云禧小馆</h1>
        <p>餐饮后台管理系统 · 管理员登录</p>
    </div>

    <div class="input-item">
        <i class="fa-solid fa-user-shield"></i>
        <input type="text" id="username" placeholder="请输入管理员账号">
    </div>

    <div class="input-item">
        <i class="fa-solid fa-key"></i>
        <input type="password" id="password" placeholder="请输入登录密码">
    </div>

    <button class="submit-btn" id="loginBtn">登录后台管理</button>

    <div class="tips-text">
        测试账号：admin ｜ 初始密码：123456
    </div>
</div>

<script>
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginButton = document.getElementById('loginBtn');

    loginButton.onclick = async () => {
        let account = usernameInput.value.trim();
        let pwd = passwordInput.value.trim();

        if (!account) {
            alert("请输入管理员账号");
            return;
        }
        if (!pwd) {
            alert("请输入登录密码");
            return;
        }

        loginButton.disabled = true;
        loginButton.innerText = "正在验证登录信息...";

        const res = await fetch("/employee/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ username: account, password: pwd })
        })
        const result = await res.json();
        if (result.code === 1) {
            localStorage.setItem("adminUser", JSON.stringify(result.data));
            // 修复跳转地址，和后端视图映射保持一致
            window.location.href = "/backend/page/index.html";
        } else {
            alert(result.msg);
        }
        loginButton.disabled = false;
        loginButton.innerText = "登录后台管理";
    }
</script>
</body>
</html>

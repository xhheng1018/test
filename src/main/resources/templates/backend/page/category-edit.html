<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>编辑分类</title>
    <style>
        body {padding:30px;font-family:微软雅黑;}
        .box {border:1px solid #eee;padding:24px;border-radius:12px;max-width:500px;}
        .row {margin:16px 0;}
        label {display: inline-block;width:100px;}
        input,select {padding:6px;width:260px;}
        button {padding:8px 22px;background:#667eea;color:white;border:none;border-radius:6px;}
        a {text-decoration: none;margin-left:15px;color:#667eea;}
    </style>
</head>
<body>
<div class="box">
    <h2>编辑分类</h2>
    <form th:action="@{/category/update}" method="post">
        <input type="hidden" name="id" th:value="${item.id}">
        <div class="row">
            <label>分类名称：</label>
            <input type="text" name="name" th:value="${item.name}" required>
        </div>
        <div class="row">
            <label>分类类型：</label>
            <select name="type">
                <option value="1" th:selected="${item.type == 1}">菜品分类</option>
                <option value="2" th:selected="${item.type == 2}">套餐分类</option>
            </select>
        </div>
        <div class="row">
            <label>排序序号：</label>
            <input type="number" name="sort" th:value="${item.sort}" required>
        </div>
        <div>
            <button type="submit">提交修改</button>
            <a th:href="@{/category}">返回列表</a>
        </div>
    </form>
</div>
</body>
</html>

# ============================================================
# Spring Boot 项目 CI/CD 工作流
# 触发条件：仅当代码推送到 main 分支时执行
# 功能：环境搭建 -> 单元测试 -> Docker 镜像构建
# ============================================================

name: Spring Boot CI/CD Pipeline

# 触发条件配置
on:
  push:
    branches:
      - main  # 仅在推送到 main 分支时触发

# 全局环境变量
env:
  JAVA_VERSION: '17'              # JDK 版本
  MYSQL_VERSION: '8.0'            # MySQL 版本
  DOCKER_IMAGE: 'springboot-app'  # Docker 镜像名称
  DOCKER_TAG: 'latest'            # Docker 镜像标签

jobs:
  # ----------------------------------------------------------
  # 任务一：构建与测试
  # ----------------------------------------------------------
  build-and-test:
    name: 构建与单元测试
    runs-on: ubuntu-latest  # 使用 Ubuntu 最新稳定版运行器

    # 配置 MySQL 服务容器
    services:
      mysql:
        image: mysql:${{ env.MYSQL_VERSION }}
        env:
          MYSQL_ROOT_PASSWORD: root123       # root 密码
          MYSQL_DATABASE: test_db            # 测试数据库名
          MYSQL_USER: test_user              # 测试用户
          MYSQL_PASSWORD: test_pass123       # 测试用户密码
        ports:
          - 3306:3306                        # 端口映射
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # 步骤 1：检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 步骤 2：设置 JDK 环境
      - name: 配置 JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'    # 使用 Eclipse Temurin 发行版
          cache: 'maven'             # 启用 Maven 依赖缓存，加速后续构建

      # 步骤 3：验证 MySQL 服务是否就绪
      - name: 等待 MySQL 服务就绪
        run: |
          echo "等待 MySQL 服务启动..."
          for i in {1..30}; do
            if mysqladmin ping -h127.0.0.1 -uroot -proot123 --silent 2>/dev/null; then
              echo "MySQL 服务已就绪"
              exit 0
            fi
            echo "等待中... ($i/30)"
            sleep 2
          done
          echo "MySQL 服务启动超时"
          exit 1

      # 步骤 4：执行单元测试
      - name: 执行单元测试
        run: |
          echo "开始执行 Maven 单元测试..."
          mvn clean test -B \
            -Dspring.datasource.url=jdbc:mysql://127.0.0.1:3306/test_db \
            -Dspring.datasource.username=test_user \
            -Dspring.datasource.password=test_pass123
        env:
          SPRING_PROFILES_ACTIVE: test  # 使用测试环境配置

      # 步骤 5：打包项目（跳过测试，避免重复执行）
      - name: 打包项目
        run: mvn package -DskipTests -B

      # 步骤 6：上传构建产物，供后续任务使用
      - name: 上传 JAR 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1  # 产物保留 1 天

  # ----------------------------------------------------------
  # 任务二：构建 Docker 镜像（依赖测试通过后执行）
  # ----------------------------------------------------------
  docker-build:
    name: 构建 Docker 镜像
    runs-on: ubuntu-latest
    needs: build-and-test  # 依赖上游任务：构建与单元测试

    steps:
      # 步骤 1：检出代码（获取 Dockerfile）
      - name: 检出代码
        uses: actions/checkout@v4

      # 步骤 2：下载上游任务产出的 JAR 包
      - name: 下载 JAR 构建产物
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      # 步骤 3：构建 Docker 镜像
      - name: 构建 Docker 镜像
        run: |
          echo "开始构建 Docker 镜像: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}"
          docker build \
            -t ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} \
            -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} \
            .
          echo "Docker 镜像构建完成"
          docker images | head -5

      # 步骤 4：验证镜像是否构建成功
      - name: 验证 Docker 镜像
        run: |
          echo "验证镜像是否存在..."
          docker image inspect ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} > /dev/null
          echo "镜像验证通过"
